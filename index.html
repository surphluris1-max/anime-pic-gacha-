<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="Browse and save random anime character images — filter by category and tag, auto-spin, and build your personal gallery." />
  <meta name="theme-color" content="#08090e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Anime Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090e;
      --panel: #0f1017;
      --panel-2: #151722;
      --surface: rgba(255, 255, 255, 0.035);
      --text: #edf2fa;
      --muted: #6b7594;
      --accent: #7c5cfc;
      --accent-light: #a78bfa;
      --accent-glow: rgba(124, 92, 252, 0.3);
      --cyan: #38d9f5;
      --cyan-glow: rgba(56, 217, 245, 0.2);
      --purple: #8b5cf6;
      --green: #22c55e;
      --gray: #334155;
      --rose: #f43f6e;
      --rose-glow: rgba(244, 63, 110, 0.25);
      --gold: #fbbf24;
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(124, 92, 252, 0.3);
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.3);
      --chip: rgba(255, 255, 255, 0.05);
      --chip-hover: rgba(124, 92, 252, 0.1);
      --chip-active: linear-gradient(135deg, var(--accent), var(--cyan));
      --danger: #be123c;
      --font: 'Outfit', system-ui, -apple-system, sans-serif;
      --radius: 14px;
      --radius-lg: 20px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(ellipse 55% 45% at 12% 8%, rgba(124, 92, 252, 0.1), transparent),
        radial-gradient(ellipse 45% 40% at 88% 15%, rgba(244, 63, 110, 0.08), transparent),
        linear-gradient(170deg, #060710 0%, var(--bg) 40%, #0a0c14 100%);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App layout ── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 12px 100px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0 14px;
    }

    .title {
      font-size: clamp(1.6rem, 4.5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent-light) 60%, var(--cyan) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      position: relative;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--chip);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn:hover, .icon-btn:active {
      border-color: var(--border-hover);
      background: var(--chip-hover);
    }

    /* ── Save badge ── */
    .save-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--rose), #e11d48);
      color: white;
      font: 700 0.65rem var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px var(--rose-glow);
      transform: scale(0);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .save-badge.visible {
      transform: scale(1);
    }

    /* ── Glass mixin ── */
    .glass {
      background: rgba(15, 16, 23, 0.85);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    /* Desktop-only blur for glass effect — skipped on mobile for performance */
    @media (hover: hover) {
      .glass {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
    }

    /* ── Content grid ── */
    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 16px;
      align-items: start;
    }

    .media-column { min-width: 0; }

    /* ── Category chips — horizontal scroll ── */
    .category-strip {
      display: flex;
      gap: 8px;
      padding: 0 0 14px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }

    .category-strip::-webkit-scrollbar { display: none; }

    .cat-chip {
      flex-shrink: 0;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--chip);
      color: var(--muted);
      font: 600 0.85rem var(--font);
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .cat-chip:hover, .cat-chip:active {
      border-color: var(--border-hover);
      color: var(--text);
    }

    .cat-chip.active {
      background: var(--chip-active);
      color: #071116;
      font-weight: 700;
      border-color: transparent;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    /* ── Image panel ── */
    .panel-container {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      max-height: 560px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
      /* Swipe hint */
      touch-action: pan-y;
    }

    .panel-container.glass { background: var(--panel); }

    /* Dual-image crossfade system */
    .panel-image {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: zoom-in;
      background: var(--panel);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .panel-image.active {
      opacity: 1;
      z-index: 1;
    }

    .empty-panel {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-weight: 500;
      z-index: 2;
    }

    .image-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 3;
    }

    .panel-container:hover .image-overlay,
    .panel-container:focus-within .image-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    /* always show on touch */
    @media (hover: none) {
      .image-overlay { opacity: 1; transform: translateY(0); }
    }

    .overlay-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      color: white;
      background: rgba(8, 9, 14, 0.8);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      font: 600 0.82rem var(--font);
    }

    /* Desktop-only blur on overlay buttons */
    @media (hover: hover) {
      .overlay-btn {
        backdrop-filter: blur(12px);
      }
    }

    /* ── Double-tap save indicator ── */
    .save-flash {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
    }

    .save-flash.show {
      animation: saveFlashAnim 0.7s ease forwards;
    }

    .save-flash-icon {
      font-size: 4rem;
      filter: drop-shadow(0 4px 20px rgba(139, 92, 246, 0.6));
    }

    @keyframes saveFlashAnim {
      0%   { opacity: 0; transform: scale(0.5); }
      30%  { opacity: 1; transform: scale(1.2); }
      70%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.1); }
    }

    /* ── Swipe indicator ── */
    .swipe-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(8, 9, 14, 0.7);
      color: var(--muted);
      font: 500 0.75rem var(--font);
      z-index: 4;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .swipe-hint.visible { opacity: 1; }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 2;
    }

    .loading-box {
      background: rgba(15, 16, 23, 0.96);
      padding: 20px;
      border-radius: var(--radius-lg);
      text-align: center;
      min-width: 260px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .loader-avatar {
      display: block;
      width: 220px;
      height: 220px;
      margin: 0 auto 14px;
      border-radius: 18px;
      object-fit: cover;
      animation: bob 1.4s ease-in-out infinite;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
      background: var(--panel-2);
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .loading-text {
      color: var(--gold);
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
    }

    /* ── Info strip below image ── */
    .info-strip {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat-pill {
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .banner-frame {
      position: relative;
      width: 110px;
      height: 110px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .banner-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
    }

    .banner-image.active { opacity: 1; }

    /* ── Tags ── */
    .tags-section {
      margin-top: 12px;
      padding: 14px;
    }

    .section-label {
      margin: 0 0 10px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--chip);
      color: var(--text);
      cursor: pointer;
      font: 600 0.85rem var(--font);
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tag-btn:hover, .tag-btn:active {
      background: var(--chip-hover);
      border-color: var(--border-hover);
    }

    .tag-btn.active {
      background: var(--chip-active);
      color: #071116;
      font-weight: 700;
      border-color: transparent;
      box-shadow: 0 3px 12px var(--accent-glow);
    }

    /* ── Sidebar controls (desktop) ── */
    .controls-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toolbar-card { padding: 16px; }

    .autospin-row {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: var(--radius);
      background: var(--chip);
      border: 1px solid var(--border);
    }

    .toggle-row label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }

    .toggle-input {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
    }

    .select-input {
      width: 100%;
      appearance: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: white;
      padding: 12px 14px;
      cursor: pointer;
      font: 500 0.9rem var(--font);
    }

    .select-input:focus { outline: none; border-color: var(--accent); }

    .sidebar-btn {
      width: 100%;
      min-height: 48px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
      font: 600 0.9rem var(--font);
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .sidebar-btn:hover, .sidebar-btn:active {
      border-color: var(--border-hover);
      background: var(--chip-hover);
    }

    .sidebar-btn.save { background: linear-gradient(135deg, var(--purple), #7c3aed); border-color: transparent; }
    .sidebar-btn.download { background: linear-gradient(135deg, var(--green), #16a34a); border-color: transparent; }

    /* ── Keyboard shortcut hints ── */
    .shortcut-hints {
      padding: 14px;
      margin-top: 2px;
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 12px;
      align-items: center;
    }

    .shortcut-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 6px;
      border-radius: 6px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--accent-light);
      font: 600 0.7rem var(--font);
      text-transform: uppercase;
    }

    .shortcut-desc {
      color: var(--muted);
      font: 500 0.78rem var(--font);
    }

    /* ── Bottom action bar (mobile) ── */
    .bottom-bar {
      display: none;
    }

    /* ── Modals ── */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.85);
      z-index: 30;
    }

    /* Desktop-only blur on modal backdrop */
    @media (hover: hover) {
      .modal {
        backdrop-filter: blur(8px);
      }
    }

    .modal.open { display: flex; }

    .dialog {
      width: min(440px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      background: var(--panel);
      border-radius: var(--radius-lg);
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .dialog h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .option-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel-2);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .option-row:hover, .option-row:active {
      border-color: var(--border-hover);
    }

    .option-row input[type="radio"] { accent-color: var(--accent); width: 18px; height: 18px; }
    .option-row span { font-weight: 600; font-size: 0.95rem; }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .close-button {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
      color: white;
      padding: 12px 20px;
      cursor: pointer;
      font: 600 0.9rem var(--font);
      transition: border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .close-button:hover, .close-button:active { border-color: var(--border-hover); }

    .fullscreen-image {
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 32px);
      max-height: calc(100dvh - 32px);
      object-fit: contain;
      cursor: zoom-out;
      border-radius: 10px;
    }

    /* ── Gallery modal ── */
    .gallery-dialog {
      width: min(720px, 100%);
      max-height: min(88vh, 780px);
      max-height: min(88dvh, 780px);
      display: flex;
      flex-direction: column;
    }

    .gallery-tools { margin-bottom: 12px; }

    .search-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 16px;
      font: 500 0.95rem var(--font);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .search-input:focus {
      border-color: rgba(124, 92, 252, 0.5);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.1);
    }

    .gallery-scroll {
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      padding-right: 4px;
    }

    .gallery-scroll::-webkit-scrollbar { width: 5px; }
    .gallery-scroll::-webkit-scrollbar-track { background: transparent; }
    .gallery-scroll::-webkit-scrollbar-thumb { background: rgba(124, 92, 252, 0.25); border-radius: 3px; }

    .gallery-item {
      border: 2px solid transparent;
      border-radius: var(--radius);
      padding: 6px;
      background: var(--panel-2);
      cursor: pointer;
      transition: border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .gallery-item.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
      background: var(--panel);
    }

    .gallery-meta {
      margin-top: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
    }

    .gallery-footer {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .gallery-selected { color: var(--muted); font-size: 0.85rem; font-weight: 500; }

    .unsave-button {
      border: 0;
      border-radius: 12px;
      background: var(--danger);
      color: white;
      padding: 10px 16px;
      cursor: pointer;
      font: 600 0.85rem var(--font);
      -webkit-tap-highlight-color: transparent;
    }

    .empty-gallery { color: var(--muted); padding: 20px 0; font-weight: 500; }

    /* ── Toasts ── */
    .toasts {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      gap: 8px;
      z-index: 60;
      pointer-events: none;
      width: min(340px, calc(100% - 24px));
    }

    .toast {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(15, 16, 23, 0.95);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      color: var(--text);
      font-weight: 600;
      font-size: 0.85rem;
      text-align: center;
      animation: toastIn 0.25s ease forwards;
    }

    /* Desktop-only blur on toasts */
    @media (hover: hover) {
      .toast {
        backdrop-filter: blur(12px);
      }
    }

    .toast.exiting {
      animation: toastOut 0.2s ease forwards;
    }

    .toast.success { border-color: rgba(34, 197, 94, 0.4); }
    .toast.error   { border-color: rgba(244, 63, 110, 0.4); }
    .toast.info    { border-color: rgba(124, 92, 252, 0.4); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }

    /* ══════════════════════════════════════
       MOBILE / ANDROID — under 860px
       ══════════════════════════════════════ */
    @media (max-width: 860px) {
      .app { padding: 10px 10px 96px; }

      .content {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      /* hide desktop sidebar */
      .controls-column { display: none; }

      /* show bottom bar — opaque on mobile, no blur */
      .bottom-bar {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 20;
        padding: 10px 10px calc(10px + var(--safe-bottom));
        background: rgba(8, 9, 14, 0.96);
        border-top: 1px solid var(--border);
        gap: 8px;
        align-items: center;
        justify-content: center;
      }

      .bar-btn {
        flex: 1;
        max-width: 120px;
        min-height: 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        border: 0;
        border-radius: 12px;
        background: transparent;
        color: var(--muted);
        font: 600 0.65rem var(--font);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: color 0.15s ease;
      }

      .bar-btn:active { color: var(--text); }

      .bar-btn .bar-icon { font-size: 1.3rem; line-height: 1; }

      .bar-btn.primary {
        background: linear-gradient(135deg, var(--accent), #9333ea);
        color: white;
        border-radius: 14px;
        box-shadow: 0 4px 18px var(--accent-glow);

        opacity: 0.5;

      .panel-container { aspect-ratio: auto; max-height: 55vh; max-height: 55dvh; min-height: 280px; }

      .banner-frame { width: 80px; height: 80px; }

      .tags-section { padding: 12px; }

      .dialog {
        border-radius: 18px 18px var(--radius-lg) var(--radius-lg);
        max-height: 85vh;
        max-height: 85dvh;

      .gallery-dialog {
        max-height: 85vh;
        max-height: 85dvh;

    }

    @media (max-width: 400px) {
      .header { padding: 4px 0 10px; }
      .title { font-size: 1.4rem; }
      .panel-container { max-height: 50vh; max-height: 50dvh; min-height: 240px; }

    /* ── Desktop keeps sidebar visible here ── */
    @media (min-width: 861px) {
      .bottom-bar { display: none !important; }
      .mobile-settings { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1 class="title">Anime Viewer</h1>
      <div class="header-actions">
        <button class="icon-btn" id="settingsBtn" type="button" title="Settings">⚙️</button>
        <button class="icon-btn" id="galleryBtnTop" type="button" title="Saved">
          💾
          <span id="saveBadge" class="save-badge">0</span>
        </button>
      </div>
    </div>

    <!-- Category strip -->
    <div class="category-strip" id="categoryStrip"></div>

    <div class="content">
      <section class="media-column">
        <!-- Image panel -->
        <div class="panel-container glass" id="panelContainer">
          <!-- Dual images for crossfade -->
          <img id="panelImageA" class="panel-image active" alt="Anime media" hidden />
          <img id="panelImageB" class="panel-image" alt="Anime media" hidden />
          <div id="emptyPanel" class="empty-panel">Loading your first image...</div>

          <div class="image-overlay">
            <button id="copyUrlButton" class="overlay-btn" type="button">📋 Copy URL</button>
          </div>

          <!-- Double-tap save flash -->
          <div id="saveFlash" class="save-flash">
            <span class="save-flash-icon">💜</span>

          <!-- Swipe hint (shown briefly on first visit) -->

          <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-box">
              <!-- Lazy: src set on first use -->
              <img id="loaderAvatar" class="loader-avatar" alt="Summoning" />
              <div class="loading-text">Summoning</div>
            </div>
          </div>
        </div>

        <!-- Info strip -->
        <div class="info-strip">
          <div id="savesStat" class="stat-pill">Saves: 0</div>
          <div id="spinsStat" class="stat-pill">Spins: 0</div>
          <div id="currentStat" class="stat-pill">Female</div>
          <div class="banner-frame" id="bannerFrame">
            <img class="banner-image active" src="gojo1.png" alt="Gojo 1" />
            <img class="banner-image" src="gojo2.png" alt="Gojo 2" />
            <img class="banner-image" src="gojo3.png" alt="Gojo 3" />
          </div>
        </div>

        <!-- The tags -->
        <div class="tags-section glass">
          <div class="section-label">Tags</div>
          <div id="tagsWrap" class="tags"></div>
        </div>
      </section>

      <!-- Desktop sidebar -->
      <aside class="controls-column">
        <div class="toolbar-card glass">
          <div class="section-label">Settings</div>
          <div class="autospin-row">
            <div class="toggle-row">
              <label for="autoSpinToggle">Auto-spin</label>
              <input id="autoSpinToggle" class="toggle-input" type="checkbox" />
            </div>
            <select id="autoSpinInterval" class="select-input">
              <option value="3000">Every 3s</option>

        <button id="spinButton" class="sidebar-btn" style="background:linear-gradient(135deg,var(--accent),#9333ea,var(--rose));color:white;border:0;font-size:1.1rem;font-weight:800;letter-spacing:0.06em;box-shadow:0 8px 24px var(--accent-glow);min-height:54px;" type="button">Spin</button>
        <button id="lastImageButton" class="sidebar-btn" type="button">↩ Last Image</button>
        <button id="saveButton" class="sidebar-btn save" type="button">💼 Save</button>
        <button id="downloadButton" class="sidebar-btn download" type="button">⬇ Download</button>
        <button id="galleryButton" class="sidebar-btn" type="button">🗂 Saved Gallery</button>

        <!-- Keyboard shortcut hints -->
        <div class="shortcut-hints glass">
          <div class="section-label">Shortcuts</div>
          <div class="shortcut-grid">
            <span class="shortcut-key">Space</span><span class="shortcut-desc">Spin</span>
            <span class="shortcut-key">S</span><span class="shortcut-desc">Save</span>
            <span class="shortcut-key">D</span><span class="shortcut-desc">Download</span>
            <span class="shortcut-key">G</span><span class="shortcut-desc">Gallery</span>
            <span class="shortcut-key">F</span><span class="shortcut-desc">Fullscreen</span>
            <span class="shortcut-key">←</span><span class="shortcut-desc">Last image</span>
            <span class="shortcut-key">Esc</span><span class="shortcut-desc">Close</span>
          </div>

    </div>
  </div>

  <!-- Bottom bar (mobile) -->
  <div class="bottom-bar">
    <button class="bar-btn" id="barLastBtn" type="button">
      <span class="bar-icon">↩</span>Last
    </button>
    <button class="bar-btn" id="barSaveBtn" type="button">
      <span class="bar-icon">💼</span>Save
    </button>
    <button class="bar-btn primary" id="barSpinBtn" type="button">
      <span class="bar-icon">🎲</span>Spin
    </button>
    <button class="bar-btn" id="barDownloadBtn" type="button">
      <span class="bar-icon">⬇</span>DL
    </button>
    <button class="bar-btn" id="barGalleryBtn" type="button">
      <span class="bar-icon">🗂</span>Saved
    </button>
  </div>

  <!-- Settings modal (mobile) -->
  <div id="settingsModal" class="modal" aria-hidden="true">
    <div class="dialog">
      <h2>Settings</h2>
      <div class="option-list">
        <div class="toggle-row">
          <label for="autoSpinToggleMobile">Auto-spin</label>
          <input id="autoSpinToggleMobile" class="toggle-input" type="checkbox" />
        </div>
        <select id="autoSpinIntervalMobile" class="select-input">
          <option value="3000">Every 3s</option>
          <option value="5000" selected>Every 5s</option>

        </select>
      </div>
      <div class="dialog-actions">

  <!-- Fullscreen modal -->
  <div id="fullscreenModal" class="modal" aria-hidden="true">
    <img id="fullscreenImage" class="fullscreen-image" alt="Fullscreen anime media" />
  </div>

  <!-- Gallery modal -->
  <div id="galleryModal" class="modal" aria-hidden="true">
    <div class="dialog gallery-dialog">
      <h2>Saved Images</h2>
      <div class="gallery-tools">
        <input id="gallerySearch" class="search-input" type="text" placeholder="Search by category or tag..." />
      </div>
      <div id="galleryScroll" class="gallery-scroll"></div>
      <div class="gallery-footer">
        <div id="gallerySelected" class="gallery-selected">Selected: none</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="clearSavedButton" class="unsave-button" type="button">Clear All</button>
          <button id="unsaveButton" class="unsave-button" type="button">Unsave</button>
        </div>
      </div>
      <div class="dialog-actions">
        <button class="close-button" type="button" data-close="#galleryModal">Close</button>
      </div>
    </div>
  </div>

  <div id="toastRoot" class="toasts"></div>

  <script>
    const SAVED_KEY = "anime_viewer_saved_images_v2";
    const STATS_KEY = "anime_viewer_stats_v1";
    const EXTRA_LOADING_MS = 400; /* reduced from 1000 for snappier feel */
    const MAX_TOASTS = 3;
    const LOADER_AVATAR_SRC = "kk.png";
    const FALLBACK_AVATAR =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(
        "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'>" +
        "<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>" +
        "<stop offset='0%' stop-color='%237c5cfc'/>" +
        "<stop offset='100%' stop-color='%2338d9f5'/>" +
        "</linearGradient></defs>" +
        "<rect width='320' height='320' rx='32' fill='%230f1017'/>" +
        "<circle cx='160' cy='118' r='72' fill='url(%23g)' opacity='0.95'/>" +
        "<circle cx='138' cy='112' r='9' fill='%23080910'/>" +
        "<circle cx='182' cy='112' r='9' fill='%23080910'/>" +
        "<path d='M132 150c16 18 40 18 56 0' stroke='%23080910' stroke-width='8' fill='none' stroke-linecap='round'/>" +
        "<path d='M102 224c16-28 44-42 58-42s42 14 58 42' fill='none' stroke='%23edf2fa' stroke-width='14' stroke-linecap='round'/>" +
        "<text x='160' y='280' text-anchor='middle' fill='%23edf2fa' font-family='Outfit,sans-serif' font-size='24'>Summoning</text>" +
        "</svg>"
      );

    const CATEGORY_CONFIG = {
      female: {
        label: "Female", emoji: "👩",
        defaultTag: "waifu",
        tags: [
          { key: "waifu", label: "Char", endpoint: "waifu" },
          { key: "smile", label: "Smile", endpoint: "smile" },
          { key: "blush", label: "Blush", endpoint: "blush" },
          { key: "happy", label: "Happy", endpoint: "happy" },
          { key: "dance", label: "Dance", endpoint: "dance" },
          { key: "wink", label: "Wink", endpoint: "wink" }
        ]
      },
      male: {
        label: "Male", emoji: "👨",
        defaultTag: "husbando",
        tags: [
          { key: "husbando", label: "Char", endpoint: "husbando" },
          { key: "smile", label: "Smile", endpoint: "smile" },
          { key: "blush", label: "Blush", endpoint: "blush" },
          { key: "happy", label: "Happy", endpoint: "happy" },
          { key: "wave", label: "Wave", endpoint: "wave" },
          { key: "wink", label: "Wink", endpoint: "wink" }
        ]
      },
      neko: {
        label: "Neko", emoji: "🐱",
        defaultTag: "neko",
        tags: [
          { key: "neko", label: "Neko", endpoint: "neko" },
          { key: "smile", label: "Smile", endpoint: "smile" },
          { key: "blush", label: "Blush", endpoint: "blush" },
          { key: "happy", label: "Happy", endpoint: "happy" },
          { key: "pat", label: "Pat", endpoint: "pat" },
          { key: "poke", label: "Poke", endpoint: "poke" }
        ]
      },
      kitsune: {
        label: "Kitsune", emoji: "🦊",
        defaultTag: "kitsune",
        tags: [
          { key: "kitsune", label: "Kitsune", endpoint: "kitsune" },
          { key: "smile", label: "Smile", endpoint: "smile" },
          { key: "blush", label: "Blush", endpoint: "blush" },
          { key: "happy", label: "Happy", endpoint: "happy" },
          { key: "dance", label: "Dance", endpoint: "dance" },
          { key: "wink", label: "Wink", endpoint: "wink" }
        ]
      },
      action: {
        label: "All", emoji: "⚡",
        defaultTag: "hug",
        tags: [
          { key: "hug", label: "Hug", endpoint: "hug" },
          { key: "pat", label: "Pat", endpoint: "pat" },
          { key: "highfive", label: "Highfive", endpoint: "highfive" },
          { key: "handhold", label: "Handhold", endpoint: "handhold" },
          { key: "nom", label: "Nom", endpoint: "nom" },
          { key: "bite", label: "Bite", endpoint: "bite" },
          { key: "wave", label: "Wave", endpoint: "wave" },
          { key: "slap", label: "Slap", endpoint: "slap" }
        ]
      }
    };

    const state = {
      category: "female",
      tag: "waifu",
      currentImageUrl: null,
      previousImage: null,
      selectedSavedId: null,
      loadingCount: 0,
      autoSpinTimer: null,
      showcaseTimer: null,
      spinCount: 0,
      saveCount: 0,
      isSpinning: false,
      activeImageSlot: "A",  /* crossfade: which <img> is currently visible */
      prefetchedUrl: null,   /* next image pre-fetched in background */
      prefetchedEndpoint: null,
      loaderAvatarLoaded: false,
      swipeHintShown: false,
      bannerObserver: null
    };

    /* ── DOM refs ── */
    const panelImageA      = document.getElementById("panelImageA");
    const panelImageB      = document.getElementById("panelImageB");
    const panelContainer   = document.getElementById("panelContainer");
    const fullscreenImage  = document.getElementById("fullscreenImage");
    const emptyPanel       = document.getElementById("emptyPanel");
    const loadingOverlay   = document.getElementById("loadingOverlay");
    const tagsWrap         = document.getElementById("tagsWrap");
    const savesStat        = document.getElementById("savesStat");
    const spinsStat        = document.getElementById("spinsStat");
    const currentStat      = document.getElementById("currentStat");
    const galleryScroll    = document.getElementById("galleryScroll");
    const gallerySelected  = document.getElementById("gallerySelected");
    const gallerySearch    = document.getElementById("gallerySearch");
    const categoryStrip    = document.getElementById("categoryStrip");
    const toastRoot        = document.getElementById("toastRoot");
    const loaderAvatar     = document.getElementById("loaderAvatar");
    const saveBadge        = document.getElementById("saveBadge");
    const saveFlash        = document.getElementById("saveFlash");
    const swipeHint        = document.getElementById("swipeHint");
    const bannerFrame      = document.getElementById("bannerFrame");
    const bannerImages     = Array.from(document.querySelectorAll(".banner-image"));

    /* desktop controls */
    const autoSpinToggle   = document.getElementById("autoSpinToggle");
    const autoSpinInterval = document.getElementById("autoSpinInterval");
    const spinButton       = document.getElementById("spinButton");

    /* mobile controls */
    const autoSpinToggleMobile   = document.getElementById("autoSpinToggleMobile");
    const autoSpinIntervalMobile = document.getElementById("autoSpinIntervalMobile");
    const barSpinBtn             = document.getElementById("barSpinBtn");



    /* ── Lazy-load loader avatar ── */
    function ensureLoaderAvatar() {
      if (!state.loaderAvatarLoaded) {
        loaderAvatar.src = LOADER_AVATAR_SRC;
        loaderAvatar.addEventListener("error", () => { loaderAvatar.src = FALLBACK_AVATAR; }, { once: true });
        state.loaderAvatarLoaded = true;
      }
    }

    /* ── Haptic feedback ── */
    function haptic(ms = 15) {
      try { navigator.vibrate && navigator.vibrate(ms); } catch (_) {}
    }

    /* ── Toast (with stack limit + exit animation) ── */
    function showToast(message, type = "info") {
      /* Enforce max toasts */
      while (toastRoot.children.length >= MAX_TOASTS) {
        toastRoot.children[0].remove();
      }
      const toast = document.createElement("div");
      toast.className = "toast " + type;
      toast.textContent = message;
      toastRoot.appendChild(toast);
      setTimeout(() => {
        toast.classList.add("exiting");
        toast.addEventListener("animationend", () => toast.remove(), { once: true });
      }, 2200);
    }

    /* ── Gojo showcase with IntersectionObserver ── */
    function startShowcase() {
      if (!bannerImages.length) return;
      let idx = 0;
      if (state.showcaseTimer) clearInterval(state.showcaseTimer);

      function tick() {
        bannerImages[idx].classList.remove("active");
        idx = (idx + 1) % bannerImages.length;
        bannerImages[idx].classList.add("active");
      }

      state.showcaseTimer = setInterval(tick, 4000);

      /* Pause when off-screen for perf */
      if ("IntersectionObserver" in window) {
        state.bannerObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              if (!state.showcaseTimer) state.showcaseTimer = setInterval(tick, 4000);
            } else {
              if (state.showcaseTimer) { clearInterval(state.showcaseTimer); state.showcaseTimer = null; }
            }
          });
        }, { threshold: 0.1 });
        state.bannerObserver.observe(bannerFrame);
      }
    }

    /* ── Loading ── */
    function showLoading() {
      ensureLoaderAvatar();
      state.loadingCount += 1;
      loadingOverlay.style.display = "flex";
    }

    function hideLoading() {
      state.loadingCount = Math.max(0, state.loadingCount - 1);
      if (state.loadingCount === 0) loadingOverlay.style.display = "none";
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    /* ── Stats ── */
    function getStats() {
      try { return JSON.parse(localStorage.getItem(STATS_KEY) || '{"spins":0,"saves":0}'); }
      catch (_) { return { spins: 0, saves: 0 }; }
    }

    function saveStats() {
      localStorage.setItem(STATS_KEY, JSON.stringify({ spins: state.spinCount, saves: state.saveCount }));
    }

    function syncStatsFromStorage() {
      const s = getStats();
      state.spinCount = Number(s.spins || 0);
      state.saveCount = Number(s.saves || 0);
      renderStats();
    }

    function renderStats() {
      savesStat.textContent  = "Saves: " + state.saveCount;
      spinsStat.textContent  = "Spins: " + state.spinCount;
      currentStat.textContent = CATEGORY_CONFIG[state.category].label;
      updateSaveBadge();
    }

    /* ── Save badge ── */
    function updateSaveBadge() {
      const count = getSavedImages().length;
      saveBadge.textContent = count > 99 ? "99+" : count;
      saveBadge.classList.toggle("visible", count > 0);
    }

    function getCategoryLabel() { return CATEGORY_CONFIG[state.category].label; }

    function getTagLabel(catKey, tagKey) {
      const t = CATEGORY_CONFIG[catKey].tags.find(i => i.key === tagKey);
      return t ? t.label : tagKey;
    }

    function getCurrentTagConfig() {
      return CATEGORY_CONFIG[state.category].tags.find(i => i.key === state.tag) || CATEGORY_CONFIG[state.category].tags[0];
    }

    /* ── Category strip ── */
    function renderCategoryStrip() {
      categoryStrip.innerHTML = "";
      Object.entries(CATEGORY_CONFIG).forEach(([key, cfg]) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "cat-chip" + (key === state.category ? " active" : "");
        chip.textContent = cfg.emoji + " " + cfg.label;
        chip.addEventListener("click", () => {
          state.category = key;
          state.tag = cfg.defaultTag;
          renderCategoryStrip();
          renderTags();
          renderStats();
          showToast("Category: " + cfg.label, "info");
          fetchAndShow();
        });
        categoryStrip.appendChild(chip);
      });
    }

    function renderTags() {
      tagsWrap.innerHTML = "";
      CATEGORY_CONFIG[state.category].tags.forEach(tag => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "tag-btn" + (tag.key === state.tag ? " active" : "");
        btn.textContent = tag.label;
        btn.addEventListener("click", () => {
          state.tag = tag.key;
          renderTags();
          renderStats();
          showToast("Tag: " + tag.label, "info");
          fetchAndShow();
        });
        tagsWrap.appendChild(btn);
      });
    }

    /* ── Modals ── */
    function openModal(sel) {
      const m = document.querySelector(sel);
      m.classList.add("open");
      m.setAttribute("aria-hidden", "false");
    }

    function closeModal(sel) {
      const m = document.querySelector(sel);
      m.classList.remove("open");
      m.setAttribute("aria-hidden", "true");
    }

    function isAnyModalOpen() {
      return document.querySelector(".modal.open") !== null;
    }

    /* ── Crossfade image display ── */
    function getActiveImage() {
      return state.activeImageSlot === "A" ? panelImageA : panelImageB;
    }

    function getInactiveImage() {
      return state.activeImageSlot === "A" ? panelImageB : panelImageA;
    }

    function updateDisplayedImage(src) {
      const incoming = getInactiveImage();
      const outgoing = getActiveImage();

      incoming.src = src;
      incoming.hidden = false;
      incoming.classList.add("active");

      outgoing.classList.remove("active");
      /* Hide outgoing after transition */
      setTimeout(() => {
        if (!outgoing.classList.contains("active")) {
          outgoing.hidden = true;
          outgoing.removeAttribute("src");
        }
      }, 400);

      emptyPanel.hidden = true;
      state.activeImageSlot = state.activeImageSlot === "A" ? "B" : "A";
    }

    function setSpinningUI(busy) {
      spinButton.disabled = busy;
      barSpinBtn.disabled = busy;
      spinButton.textContent = busy ? "Spinning…" : "Spin";
    }

    function showPreviousImage() {
      if (!state.previousImage || !state.previousImage.url) {
        showToast("No previous image yet", "info");
        return;
      }
      state.currentImageUrl = state.previousImage.url;
      state.category = state.previousImage.category;
      state.tag = state.previousImage.tag;
      renderCategoryStrip();
      renderTags();
      renderStats();
      updateDisplayedImage(state.currentImageUrl);
      showToast("Showing last image", "success");
    }

    /* ── Saved images ── */
    function getSavedImages() {
      try { return JSON.parse(localStorage.getItem(SAVED_KEY) || "[]"); }
      catch (_) { return []; }
    }

    function setSavedImages(items) {
      localStorage.setItem(SAVED_KEY, JSON.stringify(items));
      state.saveCount = items.length;
      saveStats();
      renderStats();
    }

    function syncSaveCount() {
      state.saveCount = getSavedImages().length;
      saveStats();
      renderStats();
    }

    /* ── Image prefetch ── */
    function prefetchNextImage() {
      const tagConfig = getCurrentTagConfig();
      const endpoint = tagConfig.endpoint;

      fetch(`https://nekos.best/api/v2/${endpoint}`, { cache: "no-store" })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (data && data.results && data.results.length && data.results[0].url) {
            state.prefetchedUrl = data.results[0].url;
            state.prefetchedEndpoint = endpoint;
            /* Warm browser cache by preloading the image */
            const img = new Image();
            img.src = state.prefetchedUrl;
          }
        })
        .catch(() => { /* silent */ });
    }

    /* ── Fetch ── */
    async function fetchAndShow() {
      if (state.isSpinning) return;

      const tagConfig = getCurrentTagConfig();
      const startedAt = Date.now();

      state.isSpinning = true;
      state.spinCount += 1;
      saveStats();
      renderStats();
      setSpinningUI(true);
      showLoading();
      haptic(10);

      try {
        let imageUrl = null;

        /* Use prefetched image if available and matches current endpoint */
        if (state.prefetchedUrl && state.prefetchedEndpoint === tagConfig.endpoint) {
          imageUrl = state.prefetchedUrl;
          state.prefetchedUrl = null;
          state.prefetchedEndpoint = null;
        } else {
          const response = await fetch(`https://nekos.best/api/v2/${tagConfig.endpoint}`, { cache: "no-store" });
          if (!response.ok) throw new Error("NekosBestRequestFailed");
          const data = await response.json();
          if (!data.results || !data.results.length || !data.results[0].url) throw new Error("NoImageUrl");
          imageUrl = data.results[0].url;
        }

        if (state.currentImageUrl) {
          state.previousImage = { url: state.currentImageUrl, category: state.category, tag: state.tag };
        }
        state.currentImageUrl = imageUrl;
        updateDisplayedImage(state.currentImageUrl);

        /* Prefetch next image in background */
        prefetchNextImage();
      } catch (error) {
        console.error(error);
        state.currentImageUrl = null;
        panelImageA.hidden = true;
        panelImageB.hidden = true;
        panelImageA.removeAttribute("src");
        panelImageB.removeAttribute("src");
        emptyPanel.hidden = false;
        emptyPanel.textContent = "Could not load image";
        showToast("Error loading image", "error");
      } finally {
        const remaining = Math.max(0, EXTRA_LOADING_MS - (Date.now() - startedAt));
        if (remaining > 0) await wait(remaining);
        hideLoading();
        state.isSpinning = false;
        setSpinningUI(false);
      }
    }

    async function copyCurrentUrl() {
      if (!state.currentImageUrl) { showToast("No image URL to copy", "error"); return; }
      try {
        await navigator.clipboard.writeText(state.currentImageUrl);
        showToast("URL copied", "success");
      } catch (_) { showToast("Could not copy URL", "error"); }
    }

    function saveImage() {
      if (!state.currentImageUrl) { showToast("No image loaded", "error"); return; }
      const items = getSavedImages();
      if (items.some(i => i.url === state.currentImageUrl)) { showToast("Already saved", "info"); return; }

      items.unshift({
        id: "saved_" + Date.now(),
        url: state.currentImageUrl,
        category: state.category,
        categoryLabel: getCategoryLabel(),
        tag: state.tag,
        tagLabel: getTagLabel(state.category, state.tag),
        fileName: "anime_" + Date.now()
      });
      setSavedImages(items);
      haptic(25);
      showToast("Saved!", "success");
    }

    async function downloadImage() {
      if (!state.currentImageUrl) { showToast("No image loaded", "error"); return; }
      try {
        const res = await fetch(state.currentImageUrl, { cache: "no-store" });
        if (!res.ok) throw new Error("fail");
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const ext = (blob.type.split("/")[1] || "jpg").replace("jpeg", "jpg");
        const a = document.createElement("a");
        a.href = url;
        a.download = `anime_${Date.now()}.${ext}`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast("Download started", "success");
      } catch (e) {
        console.error(e);
        showToast("Download failed", "error");
      }
    }

    /* ── Gallery (optimized — no full re-render on select) ── */
    function getFilteredSaved() {
      const q = gallerySearch.value.trim().toLowerCase();
      const items = getSavedImages();
      if (!q) return items;
      return items.filter(i => [i.categoryLabel, i.tagLabel, i.category, i.tag].join(" ").toLowerCase().includes(q));
    }

    function renderGallery() {
      const items = getFilteredSaved();
      galleryScroll.innerHTML = "";

      if (!items.length) {
        const e = document.createElement("div");
        e.className = "empty-gallery";
        e.textContent = "No saved images.";
        galleryScroll.appendChild(e);
        gallerySelected.textContent = "Selected: none";
        return;
      }

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "gallery-item" + (item.id === state.selectedSavedId ? " selected" : "");
        card.dataset.id = item.id;

        const img = document.createElement("img");
        img.src = item.url;
        img.alt = item.fileName;
        img.loading = "lazy";

        const meta = document.createElement("div");
        meta.className = "gallery-meta";
        const c = document.createElement("div");
        c.textContent = item.categoryLabel;
        const t = document.createElement("div");
        t.textContent = item.tagLabel;
        meta.appendChild(c);
        meta.appendChild(t);

        card.appendChild(img);
        card.appendChild(meta);
        card.addEventListener("click", () => {
          /* Optimized: toggle class directly instead of full re-render */
          const prev = galleryScroll.querySelector(".gallery-item.selected");
          if (prev) prev.classList.remove("selected");
          card.classList.add("selected");
          state.selectedSavedId = item.id;
          gallerySelected.textContent = "Selected: " + item.categoryLabel + " / " + item.tagLabel;
        });
        galleryScroll.appendChild(card);
      });

      if (!state.selectedSavedId || !getSavedImages().some(i => i.id === state.selectedSavedId)) {
        state.selectedSavedId = null;
        gallerySelected.textContent = "Selected: none";
      }
    }

    function openGallery() {
      state.selectedSavedId = null;
      gallerySearch.value = "";
      renderGallery();
      openModal("#galleryModal");
    }

    function unsaveSelected() {
      if (!state.selectedSavedId) { gallerySelected.textContent = "Selected: none"; return; }
      setSavedImages(getSavedImages().filter(i => i.id !== state.selectedSavedId));
      state.selectedSavedId = null;
      renderGallery();
      showToast("Removed", "success");
    }

    function clearAllSaved() {
      if (!getSavedImages().length) { showToast("Nothing to clear", "info"); return; }
      setSavedImages([]);
      state.selectedSavedId = null;
      renderGallery();
      showToast("All cleared", "success");
    }

    function openFullscreen() {
      if (!state.currentImageUrl) { showToast("No image loaded", "error"); return; }
      fullscreenImage.src = state.currentImageUrl;
      openModal("#fullscreenModal");
    }

    /* ── Auto-spin ── */
    function stopAutoSpin() {
      if (state.autoSpinTimer) { clearInterval(state.autoSpinTimer); state.autoSpinTimer = null; }
    }

    function startAutoSpin() {
      stopAutoSpin();
      const val = Number(autoSpinToggle.checked ? autoSpinInterval.value : autoSpinIntervalMobile.value);
      state.autoSpinTimer = setInterval(() => fetchAndShow(), val);
    }

    function syncAutoSpin(enabled) {
      /* sync both toggles */
      autoSpinToggle.checked = enabled;
      autoSpinToggleMobile.checked = enabled;
      if (enabled) { startAutoSpin(); showToast("Auto-spin on", "success"); }
      else { stopAutoSpin(); showToast("Auto-spin off", "info"); }
    }

    function syncIntervals() {
      /* keep desktop & mobile selects in sync */
      autoSpinIntervalMobile.value = autoSpinInterval.value;
    }

    /* ── Swipe to spin (mobile) ── */
    function initSwipeGesture() {
      let startX = 0, startY = 0, swiping = false;
      const MIN_SWIPE = 60;

      panelContainer.addEventListener("touchstart", (e) => {
        if (e.touches.length !== 1) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        swiping = true;
      }, { passive: true });

      panelContainer.addEventListener("touchmove", (e) => {
        if (!swiping) return;
        const dx = Math.abs(e.touches[0].clientX - startX);
        const dy = Math.abs(e.touches[0].clientY - startY);
        /* If scrolling vertically, cancel swipe detection */
        if (dy > dx + 10) swiping = false;
      }, { passive: true });

      panelContainer.addEventListener("touchend", (e) => {
        if (!swiping) return;
        swiping = false;
        const endX = e.changedTouches[0].clientX;
        const dx = endX - startX;
        if (Math.abs(dx) >= MIN_SWIPE) {
          haptic(10);
          fetchAndShow();
        }
      }, { passive: true });
    }

    /* ── Double-tap to save (mobile) ── */
    function initDoubleTap() {
      let lastTap = 0;
      panelContainer.addEventListener("touchend", (e) => {
        const now = Date.now();
        const diff = now - lastTap;
        lastTap = now;
        if (diff < 350 && diff > 50) {
          e.preventDefault();
          saveImage();
          /* Show flash animation */
          saveFlash.classList.remove("show");
          void saveFlash.offsetWidth; /* force reflow to restart animation */
          saveFlash.classList.add("show");
          haptic(30);
        }
      });
    }

    /* ── Swipe hint (one-time) ── */
    function showSwipeHintOnce() {
      if (localStorage.getItem("anime_viewer_swipe_hint_shown")) return;
      state.swipeHintShown = true;
      localStorage.setItem("anime_viewer_swipe_hint_shown", "1");
      swipeHint.classList.add("visible");
      setTimeout(() => swipeHint.classList.remove("visible"), 3500);
    }

    /* ── Keyboard shortcuts (desktop) ── */
    function initKeyboardShortcuts() {
      document.addEventListener("keydown", (e) => {
        /* Ignore if typing in an input */
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;

        /* Escape closes any open modal */
        if (e.key === "Escape") {
          const openModals = document.querySelectorAll(".modal.open");
          openModals.forEach(m => {
            m.classList.remove("open");
            m.setAttribute("aria-hidden", "true");
          });
          return;
        }

        /* Don't trigger shortcuts when a modal is open */
        if (isAnyModalOpen()) return;

        switch (e.key) {
          case " ":
            e.preventDefault();
            fetchAndShow();
            break;
          case "s":
          case "S":
            e.preventDefault();
            saveImage();
            break;
          case "d":
          case "D":
            e.preventDefault();
            downloadImage();
            break;
          case "g":
          case "G":
            e.preventDefault();
            openGallery();
            break;
          case "f":
          case "F":
            e.preventDefault();
            openFullscreen();
            break;
          case "ArrowLeft":
            e.preventDefault();
            showPreviousImage();
            break;
        }
      });
    }

    /* ── Events ── */

    /* Image error handling for both slots */
    panelImageA.addEventListener("error", () => {
      if (panelImageA.classList.contains("active")) {
        panelImageA.hidden = true;
        emptyPanel.hidden = false;
        emptyPanel.textContent = "Image could not be displayed";
        showToast("Image display failed", "error");
      }
    });

    panelImageB.addEventListener("error", () => {
      if (panelImageB.classList.contains("active")) {
        panelImageB.hidden = true;
        emptyPanel.hidden = false;
        emptyPanel.textContent = "Image could not be displayed";
        showToast("Image display failed", "error");
      }
    });

    /* Desktop buttons */
    document.getElementById("copyUrlButton").addEventListener("click", copyCurrentUrl);
    spinButton.addEventListener("click", fetchAndShow);
    document.getElementById("lastImageButton").addEventListener("click", showPreviousImage);
    document.getElementById("saveButton").addEventListener("click", saveImage);
    document.getElementById("downloadButton").addEventListener("click", downloadImage);
    document.getElementById("galleryButton").addEventListener("click", openGallery);
    document.getElementById("unsaveButton").addEventListener("click", unsaveSelected);
    document.getElementById("clearSavedButton").addEventListener("click", clearAllSaved);

    /* Fullscreen on click — use the active image */
    panelImageA.addEventListener("click", openFullscreen);
    panelImageB.addEventListener("click", openFullscreen);

    gallerySearch.addEventListener("input", renderGallery);

    autoSpinToggle.addEventListener("change", () => syncAutoSpin(autoSpinToggle.checked));
    autoSpinInterval.addEventListener("change", () => {
      syncIntervals();
      if (autoSpinToggle.checked) { startAutoSpin(); showToast("Interval updated", "info"); }
    });

    /* Mobile buttons */
    barSpinBtn.addEventListener("click", fetchAndShow);
    document.getElementById("barLastBtn").addEventListener("click", showPreviousImage);
    document.getElementById("barSaveBtn").addEventListener("click", saveImage);
    document.getElementById("barDownloadBtn").addEventListener("click", downloadImage);
    document.getElementById("barGalleryBtn").addEventListener("click", openGallery);
    document.getElementById("galleryBtnTop").addEventListener("click", openGallery);

    document.getElementById("settingsBtn").addEventListener("click", () => openModal("#settingsModal"));

    autoSpinToggleMobile.addEventListener("change", () => syncAutoSpin(autoSpinToggleMobile.checked));
    autoSpinIntervalMobile.addEventListener("change", () => {
      autoSpinInterval.value = autoSpinIntervalMobile.value;
      if (autoSpinToggleMobile.checked) { startAutoSpin(); showToast("Interval updated", "info"); }
    });

    /* Modals */
    document.getElementById("fullscreenModal").addEventListener("click", () => closeModal("#fullscreenModal"));
    document.querySelectorAll("[data-close]").forEach(btn => {
      btn.addEventListener("click", () => closeModal(btn.dataset.close));
    });

    /* ── Init ── */
    syncStatsFromStorage();
    syncSaveCount();
    renderCategoryStrip();
    renderTags();
    renderStats();

    startShowcase();
    initSwipeGesture();
    initDoubleTap();
    initKeyboardShortcuts();
    fetchAndShow();

    /* Show swipe hint on mobile after first image loads */
    if ("ontouchstart" in window) {
      setTimeout(showSwipeHintOnce, 2000);
    }
  </script>
</body>
</html>
