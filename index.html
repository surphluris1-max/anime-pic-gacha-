<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Viewer</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --panel: #161624;
      --panel-2: #1b1b2d;
      --text: #f5f7ff;
      --muted: #b7bdd1;
      --accent: #4dffe4;
      --accent-2: #59c3ff;
      --purple: #9742d7;
      --green: #2e7d32;
      --gray: #555555;
      --rose: #b13c78;
      --spin: #412e37;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      --chip: #27273d;
      --chip-active: linear-gradient(135deg, #4dffe4, #59c3ff);
      --danger: #8b1e3f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(89, 195, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #0f0f1a 0%, #131322 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .app {
      max-width: 1080px;
      margin: 0 auto;
      padding: 14px 14px 24px;
    }

    .title {
      margin: 0;
      padding: 8px 0 14px;
      text-align: center;
      color: var(--accent);
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 20px;
      align-items: start;
    }

    .media-column {
      min-width: 0;
    }

    .panel-container {
      position: relative;
      width: 100%;
      min-height: 520px;
      background: #0f0f1a;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .panel-image {
      display: block;
      width: 100%;
      height: 100%;
      max-height: 520px;
      object-fit: contain;
      cursor: zoom-in;
      background: #0f0f1a;
    }

    .empty-panel {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .image-overlay {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 3;
    }

    .panel-container:hover .image-overlay,
    .panel-container:focus-within .image-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .overlay-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: white;
      background: rgba(12, 12, 20, 0.78);
      backdrop-filter: blur(12px);
      cursor: pointer;
      box-shadow: var(--shadow);
      font: inherit;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      z-index: 2;
    }

    .loading-box {
      background: rgba(22, 22, 36, 0.96);
      padding: 24px;
      border-radius: 22px;
      text-align: center;
      min-width: 320px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
    }

    .loader-avatar {
      display: block;
      width: 300px;
      height: 300px;
      margin: 0 auto 16px;
      border-radius: 24px;
      object-fit: cover;
      animation: bob 1.2s ease-in-out infinite;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #1d1d30;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .loading-text {
      color: #f7e6a1;
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: 0.04em;
    }

    .toolbar-card,
    .stats-bar,
    .tags-card {
      background: rgba(22, 22, 36, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .tags-card,
    .stats-bar {
      margin-top: 14px;
      padding: 14px;
    }

    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .stats-visual {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .banner-frame {
      position: relative;
      width: 150px;
      height: 150px;
      background: transparent;
      border-radius: 0;
      overflow: visible;
      border: 0;
    }

    .banner-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
    }

    .banner-image.active {
      opacity: 1;
    }

    .stat-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .stat-pill {
      padding: 9px 12px;
      border-radius: 999px;
      background: #222238;
      color: var(--text);
      font-size: 0.95rem;
    }

    .tags-card h2,
    .toolbar-card h2,
    .gallery-dialog h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: #f3f6ff;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--chip);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .tag-btn:hover {
      transform: translateY(-1px);
    }

    .tag-btn.active {
      background: var(--chip-active);
      color: #071116;
      font-weight: 700;
    }

    .controls-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toolbar-card {
      padding: 14px;
    }

    .type-button,
    .action-button,
    .select-input {
      width: 100%;
      border: 0;
      border-radius: 14px;
      color: white;
      font: inherit;
      box-shadow: var(--shadow);
    }

    .type-button {
      background: #333333;
      padding: 12px;
      cursor: pointer;
    }

    .type-label {
      color: white;
      font-size: 0.95rem;
      margin: 10px 0 0;
    }

    .autospin-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: #222238;
    }

    .toggle-row label {
      font-size: 0.95rem;
      color: var(--text);
    }

    .toggle-input {
      width: 20px;
      height: 20px;
      accent-color: #59c3ff;
    }

    .select-input {
      appearance: none;
      background: #2a2a42;
      padding: 12px;
      cursor: pointer;
    }

    .action-button {
      min-height: 54px;
      padding: 14px;
      cursor: pointer;
      font-size: 1rem;
    }

    .spin-button {
      background: var(--spin);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .save-button { background: var(--purple); }
    .download-button { background: var(--green); }
    .gallery-button { background: var(--gray); }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.85);
      z-index: 30;
    }

    .modal.open { display: flex; }

    .dialog {
      width: min(420px, 100%);
      background: #111111;
      border-radius: 18px;
      padding: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .option-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #181828;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .close-button {
      border: 0;
      border-radius: 12px;
      background: #333333;
      color: white;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .fullscreen-image {
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 40px);
      object-fit: contain;
      cursor: zoom-out;
    }

    .gallery-dialog {
      width: min(720px, 100%);
      max-height: min(88vh, 760px);
      display: flex;
      flex-direction: column;
    }

    .gallery-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 14px;
      background: #1d1d30;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }

    .gallery-scroll {
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding-right: 4px;
    }

    .gallery-item {
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 8px;
      background: #0f0f1a;
      cursor: pointer;
    }

    .gallery-item.selected { border-color: #4dffe4; }

    .gallery-item img {
      display: block;
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 10px;
      background: #0f0f1a;
    }

    .gallery-meta {
      margin-top: 8px;
      display: grid;
      gap: 4px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .gallery-footer {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .gallery-selected {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .unsave-button {
      border: 0;
      border-radius: 12px;
      background: var(--danger);
      color: white;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .empty-gallery {
      color: var(--muted);
      padding: 16px 0;
    }

    .toasts {
      position: fixed;
      top: 18px;
      right: 18px;
      display: grid;
      gap: 10px;
      z-index: 60;
      pointer-events: none;
    }

    .toast {
      min-width: 220px;
      max-width: 320px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(20, 20, 34, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      color: var(--text);
      animation: toastIn 0.18s ease;
    }

    .toast.success { border-color: rgba(77, 255, 228, 0.35); }
    .toast.error { border-color: rgba(255, 97, 97, 0.35); }
    .toast.info { border-color: rgba(89, 195, 255, 0.35); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .content {
        grid-template-columns: 1fr;
      }

      .controls-column {
        order: -1;
      }
    }

    @media (max-width: 700px) {
      .panel-container {
        min-height: 320px;
      }

      .panel-image {
        max-height: 320px;
      }

      .loader-avatar {
        width: 240px;
        height: 240px;
      }

      .loading-box {
        min-width: 0;
        width: min(92vw, 320px);
      }

      .stats-bar {
        align-items: stretch;
      }

      .stats-visual {
        width: 100%;
        justify-content: space-between;
      }

      .gallery-scroll {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1 class="title">Anime Viewer</h1>

    <div class="content">
      <section class="media-column">
        <div class="panel-container">
          <img id="panelImage" class="panel-image" alt="Anime media" hidden />
          <div id="emptyPanel" class="empty-panel">Loading your first image...</div>

          <div class="image-overlay">
            <button id="copyUrlButton" class="overlay-btn" type="button">Copy URL</button>
          </div>

          <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-box">
              <img id="loaderAvatar" class="loader-avatar" src="kk.png" alt="Summoning" />
              <div class="loading-text">Summoning</div>
            </div>
          </div>
        </div>

        <div class="stats-bar">
          <div class="stat-group">
            <div id="savesStat" class="stat-pill">Saves: 0</div>
            <div id="spinsStat" class="stat-pill">Spins: 0</div>
          </div>
          <div class="stats-visual">
            <div class="banner-frame">
              <img class="banner-image active" src="gojo1.png" alt="Gojo showcase 1" />
              <img class="banner-image" src="gojo2.png" alt="Gojo showcase 2" />
              <img class="banner-image" src="gojo3.png" alt="Gojo showcase 3" />
            </div>
            <div class="stat-group">
              <div id="currentStat" class="stat-pill">Female</div>
            </div>
          </div>
        </div>

        <div class="tags-card">
          <h2>Tags</h2>
          <div id="tagsWrap" class="tags"></div>
        </div>
      </section>

      <aside class="controls-column">
        <div class="toolbar-card">
          <h2>Filters</h2>
          <button id="typeButton" class="type-button" type="button">Category</button>
          <div id="typeValue" class="type-label">Category: Female</div>

          <div class="autospin-row">
            <div class="toggle-row">
              <label for="autoSpinToggle">Auto-spin</label>
              <input id="autoSpinToggle" class="toggle-input" type="checkbox" />
            </div>
            <select id="autoSpinInterval" class="select-input">
              <option value="3000">Every 3s</option>
              <option value="5000" selected>Every 5s</option>
              <option value="10000">Every 10s</option>
              <option value="15000">Every 15s</option>
            </select>
          </div>
        </div>

        <button id="spinButton" class="action-button spin-button" type="button">Spin</button>
        <button id="lastImageButton" class="action-button gallery-button" type="button">See Last Image</button>
        <button id="saveButton" class="action-button save-button" type="button">Save (App)</button>
        <button id="downloadButton" class="action-button download-button" type="button">Download</button>
        <button id="galleryButton" class="action-button gallery-button" type="button">View Saved</button>
      </aside>
    </div>
  </div>

  <div id="typeModal" class="modal" aria-hidden="true">
    <div class="dialog">
      <h2>Category</h2>
      <div class="option-list">
        <label class="option-row"><input type="radio" name="category" value="female" checked /><span>Female</span></label>
        <label class="option-row"><input type="radio" name="category" value="male" /><span>Male</span></label>
        <label class="option-row"><input type="radio" name="category" value="neko" /><span>Neko</span></label>
        <label class="option-row"><input type="radio" name="category" value="kitsune" /><span>Kitsune</span></label>
        <label class="option-row"><input type="radio" name="category" value="action" /><span>All</span></label>
      </div>
      <div class="dialog-actions">
        <button class="close-button" type="button" data-close="#typeModal">Close</button>
      </div>
    </div>
  </div>

  <div id="fullscreenModal" class="modal" aria-hidden="true">
    <img id="fullscreenImage" class="fullscreen-image" alt="Fullscreen anime media" />
  </div>

  <div id="galleryModal" class="modal" aria-hidden="true">
    <div class="dialog gallery-dialog">
      <h2>Saved Images</h2>
      <div class="gallery-tools">
        <input id="gallerySearch" class="search-input" type="text" placeholder="Search saved by category or tag..." />
      </div>
      <div id="galleryScroll" class="gallery-scroll"></div>
      <div class="gallery-footer">
        <div id="gallerySelected" class="gallery-selected">Selected: none</div>
        <div class="stat-group">
          <button id="clearSavedButton" class="unsave-button" type="button">Clear All Saved</button>
          <button id="unsaveButton" class="unsave-button" type="button">Unsave Selected</button>
        </div>
      </div>
      <div class="dialog-actions">
        <button class="close-button" type="button" data-close="#galleryModal">Close</button>
      </div>
    </div>
  </div>

  <div id="toastRoot" class="toasts"></div>

  <script>
    const SAVED_KEY = "anime_viewer_saved_images_v2";
    const STATS_KEY = "anime_viewer_stats_v1";
    const EXTRA_LOADING_MS = 1000;
    const FALLBACK_AVATAR =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(
        "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'>" +
        "<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>" +
        "<stop offset='0%' stop-color='%2359c3ff'/>" +
        "<stop offset='100%' stop-color='%234dffe4'/>" +
        "</linearGradient></defs>" +
        "<rect width='320' height='320' rx='32' fill='%23161624'/>" +
        "<circle cx='160' cy='118' r='72' fill='url(%23g)' opacity='0.95'/>" +
        "<circle cx='138' cy='112' r='9' fill='%23151520'/>" +
        "<circle cx='182' cy='112' r='9' fill='%23151520'/>" +
        "<path d='M132 150c16 18 40 18 56 0' stroke='%23151520' stroke-width='8' fill='none' stroke-linecap='round'/>" +
        "<path d='M102 224c16-28 44-42 58-42s42 14 58 42' fill='none' stroke='%23f5f7ff' stroke-width='14' stroke-linecap='round'/>" +
        "<text x='160' y='280' text-anchor='middle' fill='%23f5f7ff' font-family='Segoe UI, sans-serif' font-size='24'>Summoning</text>" +
        "</svg>"
      );

    const CATEGORY_CONFIG = {
      female: {
        label: "Female",
        defaultTag: "waifu",
        tags: [
          { key: "waifu", label: "Char", endpoint: "waifu" },
          { key: "smile", label: "Smile", endpoint: "smile" },
          { key: "blush", label: "Blush", endpoint: "blush" },
          { key: "happy", label: "Happy", endpoint: "happy" },
          { key: "dance", label: "Dance", endpoint: "dance" },
          { key: "wink", label: "Wink", endpoint: "wink" }
        ]
      },
      male: {
        label: "Male",
        defaultTag: "husbando",
        tags: [
          { key: "husbando", label: "Char", endpoint: "husbando" },
          { key: "smile", label: "Smile", endpoint: "smile" },
          { key: "blush", label: "Blush", endpoint: "blush" },
          { key: "happy", label: "Happy", endpoint: "happy" },
          { key: "wave", label: "Wave", endpoint: "wave" },
          { key: "wink", label: "Wink", endpoint: "wink" }
        ]
      },
      neko: {
        label: "Neko",
        defaultTag: "neko",
        tags: [
          { key: "neko", label: "Neko", endpoint: "neko" },
          { key: "smile", label: "Smile", endpoint: "smile" },
          { key: "blush", label: "Blush", endpoint: "blush" },
          { key: "happy", label: "Happy", endpoint: "happy" },
          { key: "pat", label: "Pat", endpoint: "pat" },
          { key: "poke", label: "Poke", endpoint: "poke" }
        ]
      },
      kitsune: {
        label: "Kitsune",
        defaultTag: "kitsune",
        tags: [
          { key: "kitsune", label: "Kitsune", endpoint: "kitsune" },
          { key: "smile", label: "Smile", endpoint: "smile" },
          { key: "blush", label: "Blush", endpoint: "blush" },
          { key: "happy", label: "Happy", endpoint: "happy" },
          { key: "dance", label: "Dance", endpoint: "dance" },
          { key: "wink", label: "Wink", endpoint: "wink" }
        ]
      },
      action: {
        label: "All",
        defaultTag: "hug",
        tags: [
          { key: "hug", label: "Hug", endpoint: "hug" },
          { key: "pat", label: "Pat", endpoint: "pat" },
          { key: "highfive", label: "Highfive", endpoint: "highfive" },
          { key: "handhold", label: "Handhold", endpoint: "handhold" },
          { key: "nom", label: "Nom", endpoint: "nom" },
          { key: "bite", label: "Bite", endpoint: "bite" },
          { key: "wave", label: "Wave", endpoint: "wave" },
          { key: "slap", label: "Slap", endpoint: "slap" }
        ]
      }
    };

    const state = {
      category: "female",
      tag: "waifu",
      currentImageUrl: null,
      previousImage: null,
      selectedSavedId: null,
      loadingCount: 0,
      autoSpinTimer: null,
      showcaseTimer: null,
      spinCount: 0,
      saveCount: 0,
      isSpinning: false
    };

    const panelImage = document.getElementById("panelImage");
    const fullscreenImage = document.getElementById("fullscreenImage");
    const emptyPanel = document.getElementById("emptyPanel");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const typeButton = document.getElementById("typeButton");
    const typeValue = document.getElementById("typeValue");
    const tagsWrap = document.getElementById("tagsWrap");
    const savesStat = document.getElementById("savesStat");
    const spinsStat = document.getElementById("spinsStat");
    const currentStat = document.getElementById("currentStat");
    const galleryScroll = document.getElementById("galleryScroll");
    const gallerySelected = document.getElementById("gallerySelected");
    const gallerySearch = document.getElementById("gallerySearch");
    const autoSpinToggle = document.getElementById("autoSpinToggle");
    const autoSpinInterval = document.getElementById("autoSpinInterval");
    const toastRoot = document.getElementById("toastRoot");
    const loaderAvatar = document.getElementById("loaderAvatar");
    const bannerImages = Array.from(document.querySelectorAll(".banner-image"));

    loaderAvatar.addEventListener("error", () => {
      loaderAvatar.src = FALLBACK_AVATAR;
    }, { once: true });

    function showToast(message, type = "info") {
      const toast = document.createElement("div");
      toast.className = "toast " + type;
      toast.textContent = message;
      toastRoot.appendChild(toast);
      setTimeout(() => {
        toast.remove();
      }, 2600);
    }

    function startShowcase() {
      if (!bannerImages.length) {
        return;
      }

      let currentIndex = 0;
      if (state.showcaseTimer) {
        clearInterval(state.showcaseTimer);
      }

      state.showcaseTimer = setInterval(() => {
        bannerImages[currentIndex].classList.remove("active");
        currentIndex = (currentIndex + 1) % bannerImages.length;
        bannerImages[currentIndex].classList.add("active");
      }, 4000);
    }

    function showLoading() {
      state.loadingCount += 1;
      loadingOverlay.style.display = "flex";
    }

    function hideLoading() {
      state.loadingCount = Math.max(0, state.loadingCount - 1);
      if (state.loadingCount === 0) {
        loadingOverlay.style.display = "none";
      }
    }

    function wait(ms) {
      return new Promise((resolve) => {
        setTimeout(resolve, ms);
      });
    }

    function getStats() {
      try {
        return JSON.parse(localStorage.getItem(STATS_KEY) || "{\"spins\":0,\"saves\":0}");
      } catch (_error) {
        return { spins: 0, saves: 0 };
      }
    }

    function saveStats() {
      localStorage.setItem(STATS_KEY, JSON.stringify({
        spins: state.spinCount,
        saves: state.saveCount
      }));
    }

    function syncStatsFromStorage() {
      const stats = getStats();
      state.spinCount = Number(stats.spins || 0);
      state.saveCount = Number(stats.saves || 0);
      renderStats();
    }

    function renderStats() {
      savesStat.textContent = "Saves: " + state.saveCount;
      spinsStat.textContent = "Spins: " + state.spinCount;
      currentStat.textContent = CATEGORY_CONFIG[state.category].label;
    }

    function getCategoryLabel() {
      return CATEGORY_CONFIG[state.category].label;
    }

    function getTagLabel(categoryKey, tagKey) {
      const tag = CATEGORY_CONFIG[categoryKey].tags.find((item) => item.key === tagKey);
      return tag ? tag.label : tagKey;
    }

    function getCurrentTagConfig() {
      return CATEGORY_CONFIG[state.category].tags.find((item) => item.key === state.tag) || CATEGORY_CONFIG[state.category].tags[0];
    }

    function refreshCategoryRadios() {
      document.querySelectorAll('input[name="category"]').forEach((input) => {
        input.checked = input.value === state.category;
      });
    }

    function refreshFilterLabels() {
      typeValue.textContent = "Category: " + getCategoryLabel();
      refreshCategoryRadios();
      renderTags();
      renderStats();
    }

    function renderTags() {
      tagsWrap.innerHTML = "";
      CATEGORY_CONFIG[state.category].tags.forEach((tag) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tag-btn" + (tag.key === state.tag ? " active" : "");
        button.textContent = tag.label;
        button.addEventListener("click", () => {
          state.tag = tag.key;
          renderTags();
          renderStats();
          showToast("Tag set to " + tag.label, "info");
          fetchAndShow();
        });
        tagsWrap.appendChild(button);
      });
    }

    function openModal(selector) {
      const modal = document.querySelector(selector);
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal(selector) {
      const modal = document.querySelector(selector);
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    function updateDisplayedImage(src) {
      panelImage.src = src;
      panelImage.hidden = false;
      emptyPanel.hidden = true;
    }

    function showPreviousImage() {
      if (!state.previousImage || !state.previousImage.url) {
        showToast("No previous image yet", "info");
        return;
      }

      state.currentImageUrl = state.previousImage.url;
      state.category = state.previousImage.category;
      state.tag = state.previousImage.tag;
      refreshFilterLabels();
      updateDisplayedImage(state.currentImageUrl);
      showToast("Showing last image", "success");
    }

    function getSavedImages() {
      try {
        return JSON.parse(localStorage.getItem(SAVED_KEY) || "[]");
      } catch (_error) {
        return [];
      }
    }

    function setSavedImages(items) {
      localStorage.setItem(SAVED_KEY, JSON.stringify(items));
      state.saveCount = items.length;
      saveStats();
      renderStats();
    }

    function syncSaveCount() {
      state.saveCount = getSavedImages().length;
      saveStats();
      renderStats();
    }

    async function fetchAndShow() {
      if (state.isSpinning) {
        return;
      }

      const tagConfig = getCurrentTagConfig();
      const startedAt = Date.now();

      state.isSpinning = true;
      state.spinCount += 1;
      saveStats();
      renderStats();
      showLoading();

      try {
        const response = await fetch(`https://nekos.best/api/v2/${tagConfig.endpoint}`, {
          cache: "no-store"
        });
        if (!response.ok) {
          throw new Error("NekosBestRequestFailed");
        }

        const data = await response.json();
        if (!data.results || !data.results.length || !data.results[0].url) {
          throw new Error("NoImageUrl");
        }

        if (state.currentImageUrl) {
          state.previousImage = {
            url: state.currentImageUrl,
            category: state.category,
            tag: state.tag
          };
        }
        state.currentImageUrl = data.results[0].url;
        updateDisplayedImage(state.currentImageUrl);
      } catch (error) {
        console.error(error);
        state.currentImageUrl = null;
        panelImage.hidden = true;
        panelImage.removeAttribute("src");
        emptyPanel.hidden = false;
        emptyPanel.textContent = "Could not load image";
        showToast("Error loading image from nekos.best", "error");
      } finally {
        const elapsed = Date.now() - startedAt;
        const remaining = Math.max(0, EXTRA_LOADING_MS - elapsed);
        if (remaining > 0) {
          await wait(remaining);
        }
        hideLoading();
        state.isSpinning = false;
      }
    }

    async function copyCurrentUrl() {
      if (!state.currentImageUrl) {
        showToast("No image URL to copy", "error");
        return;
      }

      try {
        await navigator.clipboard.writeText(state.currentImageUrl);
        showToast("Image URL copied", "success");
      } catch (_error) {
        showToast("Could not copy URL", "error");
      }
    }

    function saveImage() {
      if (!state.currentImageUrl) {
        showToast("No image loaded", "error");
        return;
      }

      const savedItems = getSavedImages();
      if (savedItems.some((item) => item.url === state.currentImageUrl)) {
        showToast("Already saved", "info");
        return;
      }

      savedItems.unshift({
        id: "saved_" + Date.now(),
        url: state.currentImageUrl,
        category: state.category,
        categoryLabel: getCategoryLabel(),
        tag: state.tag,
        tagLabel: getTagLabel(state.category, state.tag),
        fileName: "anime_" + Date.now()
      });

      setSavedImages(savedItems);
      showToast("Saved to app", "success");
    }

    async function downloadImage() {
      if (!state.currentImageUrl) {
        showToast("No image loaded", "error");
        return;
      }

      try {
        const response = await fetch(state.currentImageUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("ImageDownloadFailed");
        }

        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        const extension = (blob.type.split("/")[1] || "jpg").replace("jpeg", "jpg");
        const link = document.createElement("a");
        link.href = objectUrl;
        link.download = `anime_${Date.now()}.${extension}`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(objectUrl);
        showToast("Download started", "success");
      } catch (error) {
        console.error(error);
        showToast("Download failed for this image host", "error");
      }
    }

    function getFilteredSavedImages() {
      const query = gallerySearch.value.trim().toLowerCase();
      const items = getSavedImages();
      if (!query) {
        return items;
      }

      return items.filter((item) => {
        const haystack = [
          item.categoryLabel,
          item.tagLabel,
          item.category,
          item.tag
        ].join(" ").toLowerCase();
        return haystack.includes(query);
      });
    }

    function renderGallery() {
      const items = getFilteredSavedImages();
      galleryScroll.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty-gallery";
        empty.textContent = "No saved images match your search.";
        galleryScroll.appendChild(empty);
        gallerySelected.textContent = "Selected: none";
        return;
      }

      items.forEach((item) => {
        const card = document.createElement("div");
        card.className = "gallery-item" + (item.id === state.selectedSavedId ? " selected" : "");

        const image = document.createElement("img");
        image.src = item.url;
        image.alt = item.fileName;
        image.loading = "lazy";

        const meta = document.createElement("div");
        meta.className = "gallery-meta";
        meta.innerHTML = `<div>${item.categoryLabel}</div><div>${item.tagLabel}</div>`;

        card.appendChild(image);
        card.appendChild(meta);

        card.addEventListener("click", () => {
          state.selectedSavedId = item.id;
          gallerySelected.textContent = "Selected: " + item.categoryLabel + " / " + item.tagLabel;
          renderGallery();
        });

        galleryScroll.appendChild(card);
      });

      if (!state.selectedSavedId || !getSavedImages().some((item) => item.id === state.selectedSavedId)) {
        state.selectedSavedId = null;
        gallerySelected.textContent = "Selected: none";
      }
    }

    function openGallery() {
      state.selectedSavedId = null;
      gallerySearch.value = "";
      renderGallery();
      openModal("#galleryModal");
    }

    function unsaveSelected() {
      if (!state.selectedSavedId) {
        gallerySelected.textContent = "Selected: none";
        return;
      }

      const items = getSavedImages().filter((item) => item.id !== state.selectedSavedId);
      setSavedImages(items);
      state.selectedSavedId = null;
      renderGallery();
      showToast("Removed from saved", "success");
    }

    function clearAllSaved() {
      const items = getSavedImages();
      if (!items.length) {
        showToast("No saved images to clear", "info");
        return;
      }

      setSavedImages([]);
      state.selectedSavedId = null;
      renderGallery();
      showToast("Cleared all saved images", "success");
    }

    function openFullscreen() {
      if (!panelImage.src) {
        showToast("No image loaded", "error");
        return;
      }
      fullscreenImage.src = panelImage.src;
      openModal("#fullscreenModal");
    }

    function stopAutoSpin() {
      if (state.autoSpinTimer) {
        clearInterval(state.autoSpinTimer);
        state.autoSpinTimer = null;
      }
    }

    function startAutoSpin() {
      stopAutoSpin();
      const interval = Number(autoSpinInterval.value);
      state.autoSpinTimer = setInterval(() => {
        fetchAndShow();
      }, interval);
    }

    function syncAutoSpin() {
      if (autoSpinToggle.checked) {
        startAutoSpin();
        showToast("Auto-spin enabled", "success");
      } else {
        stopAutoSpin();
        showToast("Auto-spin disabled", "info");
      }
    }

    panelImage.addEventListener("error", () => {
      panelImage.hidden = true;
      emptyPanel.hidden = false;
      emptyPanel.textContent = "Image could not be displayed";
      showToast("The image URL could not be shown", "error");
    });

    document.getElementById("copyUrlButton").addEventListener("click", copyCurrentUrl);
    document.getElementById("spinButton").addEventListener("click", fetchAndShow);
    document.getElementById("lastImageButton").addEventListener("click", showPreviousImage);
    document.getElementById("saveButton").addEventListener("click", saveImage);
    document.getElementById("downloadButton").addEventListener("click", downloadImage);
    document.getElementById("galleryButton").addEventListener("click", openGallery);
    document.getElementById("unsaveButton").addEventListener("click", unsaveSelected);
    document.getElementById("clearSavedButton").addEventListener("click", clearAllSaved);
    typeButton.addEventListener("click", () => openModal("#typeModal"));
    panelImage.addEventListener("click", openFullscreen);
    gallerySearch.addEventListener("input", renderGallery);
    autoSpinToggle.addEventListener("change", syncAutoSpin);
    autoSpinInterval.addEventListener("change", () => {
      if (autoSpinToggle.checked) {
        startAutoSpin();
        showToast("Auto-spin interval updated", "info");
      }
    });

    document.getElementById("fullscreenModal").addEventListener("click", () => closeModal("#fullscreenModal"));
    document.querySelectorAll("[data-close]").forEach((button) => {
      button.addEventListener("click", () => closeModal(button.dataset.close));
    });

    document.querySelectorAll('input[name="category"]').forEach((input) => {
      input.addEventListener("change", () => {
        state.category = input.value;
        state.tag = CATEGORY_CONFIG[state.category].defaultTag;
        refreshFilterLabels();
        closeModal("#typeModal");
        showToast("Category set to " + getCategoryLabel(), "info");
        fetchAndShow();
      });
    });

    syncStatsFromStorage();
    syncSaveCount();
    refreshFilterLabels();
    startShowcase();
    fetchAndShow();
  </script>
</body>
</html>
